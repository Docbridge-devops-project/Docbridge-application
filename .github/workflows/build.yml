    if: contains(fromJson(needs.detect-changes.outputs.changed_services), 'frontend')
    uses: ./.github/workflows/template-sonarcloud.yml
    with:
      service_name: frontend
      working_directory: ./frontend
      sonar_project_key: docbridge_frontend
    secrets: inherit

  cicd-frontend-build:
